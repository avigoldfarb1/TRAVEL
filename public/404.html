<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA redirect
      // Saves the full URL in sessionStorage then redirects to root
      var l = window.location;
      sessionStorage.setItem('redirect', l.pathname.slice(1) + (l.search || '') + l.hash);
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + l.pathname.split('/').slice(0, 2).join('/'));
    </script>
  </head>
</html>
